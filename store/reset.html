<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password — BRONCO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Roboto+Slab:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=11">
  <style>
    body { background: #fdfaf6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .reset-card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(92,58,33,0.1); max-width: 400px; width: 90%; text-align: center; border: 1.5px solid #e7dfd7; }
    .reset-card h2 { font-family: 'Rye', serif; color: #5C3A21; margin-top: 0; }
    .muted { color: #888; font-size: 14px; margin-bottom: 20px; font-family: 'Poppins', sans-serif; }
    .field { margin-bottom: 15px; text-align: left; }
    .field label { display: block; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 13px; color: #3E2615; margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px; border: 1.5px solid #e7dfd7; border-radius: 8px; font-family: 'Poppins', sans-serif; }
    .btn { width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; }
    #msg { margin-top: 15px; font-size: 14px; font-weight: 600; display: none; }
  </style>
</head>
<body>

<div class="reset-card">
  <h2>BRONCO</h2>
  <div class="muted">Set your new password below.</div>
  
  <form id="reset-form">
    <div class="field">
      <label>New Password</label>
      <input type="password" id="new-pass" placeholder="At least 6 characters" required>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="conf-pass" placeholder="Retype new password" required>
    </div>
    <button type="submit" id="btn-submit" class="btn">Update Password</button>
  </form>
  
  <div id="msg"></div>
  <a href="index.html" style="display:inline-block; margin-top:20px; color:#A16B43; text-decoration:none; font-family:'Poppins', sans-serif; font-size:14px; font-weight:600;">&larr; Return to Store</a>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const form = document.getElementById('reset-form');
  const msgEl = document.getElementById('msg');
  const btn = document.getElementById('btn-submit');
  
  if(!token) {
      form.style.display = 'none';
      msgEl.style.display = 'block';
      msgEl.style.color = '#b33';
      msgEl.textContent = '⚠️ Invalid or missing reset token.';
  }
  
  form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = document.getElementById('new-pass').value;
      const p2 = document.getElementById('conf-pass').value;
      
      if(p1.length < 6) { showMsg('Password must be at least 6 characters.', 'red'); return; }
      if(p1 !== p2) { showMsg('Passwords do not match.', 'red'); return; }
      
      btn.disabled = true;
      btn.textContent = 'Updating...';
      
      try {
          let req = await fetch('../api/api.php?action=execute_password_reset', {
              method: 'POST', headers: {'Content-Type':'application/json'},
              body: JSON.stringify({ token, new_password: p1 })
          });
          let res = await req.json();
          if(res.success) {
              form.style.display = 'none';
              showMsg('✅ Password updated successfully! You can now log in.', '#2a7a3b');
          } else {
              showMsg('⚠️ ' + (res.message || 'Token may have expired.'), '#b33');
              btn.disabled = false;
              btn.textContent = 'Update Password';
          }
      } catch(err) {
          showMsg('⚠️ Server error.', '#b33');
          btn.disabled = false;
          btn.textContent = 'Update Password';
      }
  });
  
  function showMsg(txt, color) {
      msgEl.textContent = txt;
      msgEl.style.color = color;
      msgEl.style.display = 'block';
  }
</script>

</body>
</html>
